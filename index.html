<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 小说创作工作台 · 演示版</title>
  <meta name="description" content="AI 小说创作工作台 — 网页演示版。展示全部功能界面，AI 响应为预设演示内容，不可用于实际写作。" />
  <meta name="robots" content="noindex" />

  <!-- 1️⃣ 预填演示数据（localStorage） -->
  <script>
    (function() {
      var STORAGE_KEY = "novel-writer-frontend-v1";
      if (!localStorage.getItem(STORAGE_KEY)) {
        console.log("[demo] localStorage 未初始化，应用将自动填充示例数据。");
      }
    })();
  </script>

  <!-- 2️⃣ 注入 mock API（必须在应用 bundle 之前） -->
  <script src="demo-mock.js"></script>

  <!-- 3️⃣ 应用样式 -->
  <link rel="stylesheet" href="assets/index-vApeFGn1.css" />

  <style>
    /* 弹窗遮罩 */
    .contact-overlay {
      position: fixed; inset: 0; z-index: 100000;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.3s ease;
      /* 移动端：可滚动 */ overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .contact-modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px 20px 20px;
      max-width: 400px; width: 92%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
      position: relative;
      animation: slideUp 0.35s ease;
      /* 移动端适应小屏 */ max-height: 95vh; overflow-y: auto;
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* 顶部关闭条 — 大触控区域 */
    .close-bar {
      display: flex; align-items: center; justify-content: flex-end;
      margin-bottom: 6px;
    }
    .contact-modal .close-btn {
      background: #f1f5f9; border: none; border-radius: 22px;
      min-width: 44px; min-height: 44px; /* 满足 44px 触控标准 */
      font-size: 20px; color: #64748b;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; padding: 0 14px;
    }
    .contact-modal .close-btn:hover, .contact-modal .close-btn:active { background: #e2e8f0; }

    /* 底部大按钮 */
    .enter-btn {
      display: block; width: 100%; margin-top: 16px;
      padding: 14px 0; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff; font-size: 17px; font-weight: 700;
      cursor: pointer; letter-spacing: 2px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .enter-btn:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

    .contact-modal h2 {
      margin: 0 0 6px; font-size: 22px; color: #0f172a;
    }
    .contact-modal .subtitle {
      font-size: 13px; color: #94a3b8; margin-bottom: 18px;
    }

    /* QQ 大字 */
    .qq-big {
      font-size: 36px; font-weight: 900; color: #0f172a;
      letter-spacing: 3px; margin: 8px 0;
      font-family: "SF Mono", "Consolas", "Courier New", monospace;
    }
    .qq-label {
      font-size: 12px; color: #f59e0b; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
    }
    .qq-qr {
      width: 140px; height: 140px; margin: 14px auto;
      display: block; border: 2px solid #e2e8f0; border-radius: 10px;
      padding: 6px; background: #fff;
    }

    /* 分割线 */
    .divider {
      height: 1px; background: #e2e8f0; margin: 18px 0;
    }

    /* 价格 */
    .price-section {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border-radius: 10px; padding: 14px 16px; margin: 12px 0;
    }
    .price-big {
      font-size: 28px; font-weight: 900; color: #d97706;
    }
    .price-desc {
      font-size: 12px; color: #92400e; margin-top: 4px;
      line-height: 1.6;
    }
    .price-tag {
      display: inline-block; background: #f59e0b; color: #fff;
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; margin-top: 6px;
    }

    /* 抖音 */
    .douyin-section {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin: 10px 0; padding: 10px 0;
      border-top: 1px dashed #e2e8f0; border-bottom: 1px dashed #e2e8f0;
    }
    .douyin-icon {
      width: 36px; height: 36px; background: #000; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #fff; font-weight: 900;
      flex-shrink: 0;
    }
    .douyin-text {
      text-align: left; font-size: 13px; line-height: 1.5;
    }
    .douyin-name { font-weight: 700; color: #0f172a; }
    .douyin-id { color: #64748b; font-size: 12px; }

    /* 演示水印 */
    .demo-watermark {
      position: fixed;
      bottom: 12px; right: 16px; z-index: 99998;
      color: rgba(245, 158, 11, 0.4); font-size: 11px;
      pointer-events: none; user-select: none;
    }
  </style>
</head>
<body>
  <!-- 联系弹窗 -->
  <div id="contact-overlay" class="contact-overlay" onclick="if(event.target===this)this.remove()">
    <div class="contact-modal">
      <div class="close-bar">
        <button class="close-btn" onclick="document.getElementById('contact-overlay').remove()">✕ 关闭</button>
      </div>

      <h2>📖 AI 小说创作工作台</h2>
      <p class="subtitle">番茄小说作者专用 · AI 辅助创作工具</p>

      <!-- QQ -->
      <div class="qq-label">▎ 联系 QQ</div>
      <div class="qq-big">3371489998</div>
      <img class="qq-qr" src="qq-douyin-qr.jpg" alt="QQ二维码 · 抖音二维码" style="width:180px;height:auto;" />

      <!-- 价格 -->
      <div class="price-section">
        <div class="price-big">¥59</div>
        <div style="font-weight:700;color:#92400e;font-size:14px;">统一售价 · 永久使用</div>
        <div class="price-desc">一次购买，永久激活<br>后续升级维护 <b>永久免费</b></div>
        <div class="price-tag">🔥 买断制 · 无月费</div>
      </div>

      <!-- 抖音 -->
      <div class="divider"></div>
      <div class="douyin-section">
        <div class="douyin-icon">♪</div>
        <div class="douyin-text">
          <div class="douyin-name">📱 抖音关注：深度思考</div>
          <div class="douyin-id">抖音号：44232254497</div>
          <div style="font-size:11px;color:#94a3b8;margin-top:2px;">关注了解软件更新 & 创作技巧</div>
        </div>
      </div>

      <button class="enter-btn" onclick="document.getElementById('contact-overlay').remove()">🚀 开始体验演示版</button>
    </div>
  </div>

  <!-- React 根节点 -->
  <div id="root"></div>

  <!-- 右下角水印 -->
  <div class="demo-watermark">演示版 · AI 内容为预设展示数据</div>

  <!-- 4️⃣ 应用 bundle -->
  <script type="module" crossorigin src="assets/index-DamQccVa.js"></script>
</body>
</html>
